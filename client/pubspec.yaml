name: client
description: "TN-Epic Flutter app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  camera: ^0.11.0
  google_maps_flutter: ^2.6.0
  geolocator: ^11.0.0
  location: ^5.0.3
  lottie: ^3.1.2
  http: ^1.2.0
  arcore_flutter_plugin: ^0.1.0
  flutter_blue_plus: ^1.32.12
  flutter_riverpod: ^2.4.10
  hive_flutter: ^1.1.0
  sensors_plus: ^5.0.1
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/image_database.imgdb
    - assets/floor_plan.png
